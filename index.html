<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>保守論評 Note下書き生成システム</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #010409;
      --bg-card: #0d1117;
      --bg-card-hover: #161b22;
      --accent: #e94560;
      --accent-dark: #c73652;
      --border: #21262d;
      --text: #c9d1d9;
      --text-muted: #8b949e;
      --text-bright: #f0f6fc;
      --success: #3fb950;
      --error: #f85149;
      --info: #58a6ff;
      --warning: #d29922;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Noto Sans JP', sans-serif;
      font-size: 14px;
      line-height: 1.6;
      min-height: 100vh;
    }

    .container { max-width: 960px; margin: 0 auto; padding: 24px 16px; }

    /* ヘッダー */
    .header {
      text-align: center;
      margin-bottom: 24px;
      padding-bottom: 20px;
      border-bottom: 1px solid var(--border);
    }
    .header h1 { font-size: 22px; font-weight: 700; color: var(--text-bright); margin-bottom: 4px; }
    .header h1 span { color: var(--accent); }
    .header p { color: var(--text-muted); font-size: 12px; }

    /* APIキーバー */
    .api-bar {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px 16px;
      margin-bottom: 16px;
      display: flex;
      gap: 8px;
      align-items: center;
    }
    .api-bar label { font-size: 12px; color: var(--text-muted); white-space: nowrap; }
    .api-bar input {
      flex: 1;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 7px 10px;
      color: var(--text-bright);
      font-family: inherit;
      font-size: 13px;
      outline: none;
    }
    .api-bar input:focus { border-color: var(--accent); }
    .api-bar input::placeholder { color: var(--text-muted); }

    /* タブ */
    .tabs {
      display: flex;
      gap: 0;
      border-bottom: 1px solid var(--border);
      margin-bottom: 20px;
    }
    .tab-btn {
      background: none;
      border: none;
      border-bottom: 2px solid transparent;
      padding: 10px 20px;
      color: var(--text-muted);
      font-family: inherit;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: color 0.2s, border-color 0.2s;
      margin-bottom: -1px;
    }
    .tab-btn:hover { color: var(--text); }
    .tab-btn.active { color: var(--text-bright); border-bottom-color: var(--accent); }

    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    /* セクション */
    .section {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 18px;
      margin-bottom: 16px;
    }
    .section-title {
      font-size: 12px;
      font-weight: 700;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .section-title::before {
      content: '';
      display: inline-block;
      width: 3px; height: 13px;
      background: var(--accent);
      border-radius: 2px;
    }

    /* テーマグリッド */
    .theme-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(190px, 1fr));
      gap: 7px;
    }
    .theme-item {
      display: flex;
      align-items: center;
      gap: 7px;
      padding: 7px 10px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
      user-select: none;
    }
    .theme-item:hover, .theme-item.checked { border-color: var(--accent); background: #1a0a0e; }
    .theme-item input[type="checkbox"] { accent-color: var(--accent); width: 14px; height: 14px; cursor: pointer; }
    .theme-label { font-size: 13px; color: var(--text); }

    /* キーワード */
    .keyword-row { display: flex; gap: 8px; }
    .keyword-row input {
      flex: 1;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 8px 10px;
      color: var(--text-bright);
      font-family: inherit;
      font-size: 13px;
      outline: none;
    }
    .keyword-row input:focus { border-color: var(--accent); }
    .keyword-row input::placeholder { color: var(--text-muted); }

    /* ボタン */
    .btn {
      padding: 8px 16px;
      border: none;
      border-radius: 6px;
      font-family: inherit;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
      white-space: nowrap;
    }
    .btn:active { transform: scale(0.97); }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
    .btn-primary { background: linear-gradient(135deg, var(--accent), var(--accent-dark)); color: #fff; }
    .btn-primary:hover:not(:disabled) { opacity: 0.88; }
    .btn-secondary { background: #21262d; color: var(--text); border: 1px solid var(--border); }
    .btn-secondary:hover:not(:disabled) { background: #2d333b; border-color: #8b949e; }
    .btn-blue { background: linear-gradient(135deg, #1f6feb, #1158c7); color: #fff; }
    .btn-blue:hover:not(:disabled) { opacity: 0.88; }
    .btn-green { background: linear-gradient(135deg, #238636, #1a6e2e); color: #fff; }
    .btn-green:hover:not(:disabled) { opacity: 0.88; }

    /* 検索エリア */
    .search-area { display: flex; justify-content: center; margin-bottom: 20px; }
    .btn-search { padding: 10px 28px; font-size: 14px; }

    /* ローディング */
    .loading-spinner {
      display: inline-block;
      width: 13px; height: 13px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin-right: 5px;
      vertical-align: middle;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* トピックカード */
    .topics-container { display: flex; flex-direction: column; gap: 14px; }
    .topic-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 18px;
      transition: border-color 0.2s, background 0.2s;
    }
    .topic-card:hover { border-color: #30363d; background: var(--bg-card-hover); }
    .topic-card-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 10px;
      margin-bottom: 10px;
    }
    .topic-headline { font-size: 15px; font-weight: 700; color: var(--text-bright); line-height: 1.4; flex: 1; }
    .status-badge {
      padding: 2px 9px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 500;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .status-idle { background: #21262d; color: var(--text-muted); }
    .status-generating { background: #1f3a5f; color: var(--info); }
    .status-done { background: #1a3a2a; color: var(--success); }
    .status-error { background: #3a1a1a; color: var(--error); }

    .topic-summary { color: var(--text-muted); font-size: 13px; margin-bottom: 10px; }
    .topic-tags { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 10px; }
    .topic-tag {
      padding: 2px 7px;
      background: #1a0a0e;
      border: 1px solid #3a1020;
      border-radius: 4px;
      font-size: 11px;
      color: var(--accent);
    }
    .topic-details {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 12px;
    }
    @media (max-width: 600px) { .topic-details { grid-template-columns: 1fr; } }
    .detail-box {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 9px 11px;
    }
    .detail-box-title { font-size: 11px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 5px; }
    .detail-box ul { list-style: none; }
    .detail-box ul li { font-size: 12px; color: var(--text); padding: 2px 0 2px 12px; position: relative; }
    .detail-box ul li::before { content: '▸'; position: absolute; left: 0; color: var(--accent); font-size: 10px; }

    .topic-actions { display: flex; gap: 7px; flex-wrap: wrap; }

    /* 下書きエリア */
    .draft-area { margin-top: 12px; border-top: 1px solid var(--border); padding-top: 12px; }
    .draft-area textarea {
      width: 100%;
      min-height: 280px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 10px;
      color: var(--text-bright);
      font-family: inherit;
      font-size: 13px;
      line-height: 1.7;
      resize: vertical;
      outline: none;
      margin-bottom: 8px;
    }
    .draft-area textarea:focus { border-color: var(--accent); }
    .draft-actions { display: flex; gap: 7px; flex-wrap: wrap; }

    /* エビデンスタブ */
    .evidence-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
    @media (max-width: 700px) { .evidence-grid { grid-template-columns: 1fr; } }

    .ev-section {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 16px;
    }
    .ev-section-title {
      font-size: 13px;
      font-weight: 700;
      color: var(--text-bright);
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    select {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 7px 10px;
      color: var(--text-bright);
      font-family: inherit;
      font-size: 13px;
      outline: none;
      width: 100%;
      cursor: pointer;
      margin-bottom: 8px;
    }
    select:focus { border-color: var(--accent); }
    select option { background: #0d1117; }

    .link-list { list-style: none; margin-top: 8px; }
    .link-list li { margin-bottom: 6px; }
    .link-list a {
      color: var(--info);
      text-decoration: none;
      font-size: 13px;
      display: flex;
      align-items: center;
      gap: 5px;
    }
    .link-list a:hover { text-decoration: underline; }
    .link-list a::before { content: '🔗'; font-size: 11px; }

    /* 調査ガイド */
    .guide-steps { margin-top: 8px; }
    .guide-step {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 10px 12px;
      margin-bottom: 8px;
    }
    .guide-step-label {
      font-size: 11px;
      font-weight: 700;
      color: var(--accent);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 4px;
    }
    .guide-step p { font-size: 13px; color: var(--text); margin-bottom: 4px; }
    .guide-step a { color: var(--info); font-size: 12px; text-decoration: none; }
    .guide-step a:hover { text-decoration: underline; }

    /* 国会検索 */
    .kokkai-row { display: flex; gap: 8px; margin-top: 4px; }
    .kokkai-row input {
      flex: 1;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 8px 10px;
      color: var(--text-bright);
      font-family: inherit;
      font-size: 13px;
      outline: none;
    }
    .kokkai-row input:focus { border-color: var(--accent); }
    .kokkai-row input::placeholder { color: var(--text-muted); }

    /* 情報公開テンプレ */
    .template-form { display: flex; flex-direction: column; gap: 8px; }
    .template-form input {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 8px 10px;
      color: var(--text-bright);
      font-family: inherit;
      font-size: 13px;
      outline: none;
    }
    .template-form input:focus { border-color: var(--accent); }
    .template-form input::placeholder { color: var(--text-muted); }
    .template-result {
      margin-top: 10px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 10px;
    }
    .template-result textarea {
      width: 100%;
      min-height: 160px;
      background: transparent;
      border: none;
      color: var(--text-bright);
      font-family: inherit;
      font-size: 13px;
      line-height: 1.7;
      resize: vertical;
      outline: none;
      margin-bottom: 8px;
    }

    /* メモ帳タブ */
    .memo-add-form {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 16px;
      margin-bottom: 14px;
    }
    .memo-add-form input {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 8px 10px;
      color: var(--text-bright);
      font-family: inherit;
      font-size: 13px;
      outline: none;
      margin-bottom: 8px;
    }
    .memo-add-form input:focus { border-color: var(--accent); }
    .memo-add-form input::placeholder { color: var(--text-muted); }
    .memo-add-form textarea {
      width: 100%;
      min-height: 100px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 8px 10px;
      color: var(--text-bright);
      font-family: inherit;
      font-size: 13px;
      line-height: 1.6;
      resize: vertical;
      outline: none;
      margin-bottom: 8px;
    }
    .memo-add-form textarea:focus { border-color: var(--accent); }
    .memo-add-form textarea::placeholder { color: var(--text-muted); }

    .memo-list { display: flex; flex-direction: column; gap: 10px; }
    .memo-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 14px;
    }
    .memo-card-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }
    .memo-card-title { font-size: 14px; font-weight: 700; color: var(--text-bright); }
    .memo-card-date { font-size: 11px; color: var(--text-muted); }
    .memo-card-body {
      font-size: 13px;
      color: var(--text);
      white-space: pre-wrap;
      word-break: break-all;
      line-height: 1.6;
    }
    .memo-card-actions { margin-top: 8px; display: flex; gap: 6px; }

    /* エビデンス添付モーダル */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      z-index: 1000;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }
    .modal-overlay.hidden { display: none; }
    .modal {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px;
      width: 100%;
      max-width: 560px;
      max-height: 80vh;
      overflow-y: auto;
    }
    .modal-title {
      font-size: 15px;
      font-weight: 700;
      color: var(--text-bright);
      margin-bottom: 14px;
    }
    .modal-memo-item {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 10px 12px;
      margin-bottom: 8px;
      cursor: pointer;
      transition: border-color 0.2s;
    }
    .modal-memo-item:hover { border-color: var(--accent); }
    .modal-memo-item .title { font-size: 13px; font-weight: 700; color: var(--text-bright); margin-bottom: 3px; }
    .modal-memo-item .preview { font-size: 12px; color: var(--text-muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .modal-actions { display: flex; justify-content: flex-end; gap: 8px; margin-top: 12px; }

    /* エラー・トースト */
    .error-msg {
      background: #3a1a1a;
      border: 1px solid var(--error);
      color: var(--error);
      padding: 9px 12px;
      border-radius: 6px;
      font-size: 13px;
      margin-top: 8px;
    }
    .toast {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: #1a3a2a;
      border: 1px solid var(--success);
      color: var(--success);
      padding: 9px 16px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 500;
      opacity: 0;
      transform: translateY(8px);
      transition: opacity 0.3s, transform 0.3s;
      pointer-events: none;
      z-index: 9999;
    }
    .toast.show { opacity: 1; transform: translateY(0); }

    /* 空状態 */
    .empty-state { text-align: center; padding: 40px 20px; color: var(--text-muted); }
    .empty-state .icon { font-size: 40px; margin-bottom: 10px; opacity: 0.5; }
    .empty-state p { font-size: 13px; }

    /* スクロールバー */
    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: #30363d; border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #484f58; }

    /* 全幅セクション */
    .ev-full { grid-column: 1 / -1; }
  </style>
</head>
<body>
<div class="container">

  <!-- ヘッダー -->
  <div class="header">
    <h1>保守論評 <span>Note</span> 下書き生成システム</h1>
    <p>保守的観点から日本の政治・社会問題を論評するNote投稿の下書きを生成します</p>
  </div>

  <!-- APIキーバー -->
  <div class="api-bar">
    <label>🔑 APIキー</label>
    <input type="password" id="apiKeyInput" placeholder="Anthropic APIキー (sk-ant-...)" autocomplete="off">
    <button class="btn btn-secondary" onclick="saveApiKey()">保存</button>
    <button class="btn btn-secondary" onclick="clearApiKey()">クリア</button>
  </div>

  <!-- タブ -->
  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('draft', this)">📝 下書き生成</button>
    <button class="tab-btn" onclick="switchTab('evidence', this)">🔍 エビデンス収集</button>
    <button class="tab-btn" onclick="switchTab('memo', this)">📋 メモ帳</button>
  </div>

  <!-- ===== タブ1: 下書き生成 ===== -->
  <div id="tab-draft" class="tab-panel active">

    <!-- テーマ選択 -->
    <div class="section">
      <div class="section-title">テーマ選択</div>
      <div class="theme-grid" id="themeGrid">
        <label class="theme-item"><input type="checkbox" value="koukin" onchange="toggleTheme(this)"><span class="theme-label">💴 公金搾取</span></label>
        <label class="theme-item"><input type="checkbox" value="nichibenren" onchange="toggleTheme(this)"><span class="theme-label">⚖️ 日弁連・司法</span></label>
        <label class="theme-item"><input type="checkbox" value="kyosanto" onchange="toggleTheme(this)"><span class="theme-label">🚩 共産党・左翼政党</span></label>
        <label class="theme-item"><input type="checkbox" value="nikkyoso" onchange="toggleTheme(this)"><span class="theme-label">🏫 日教組・教育</span></label>
        <label class="theme-item"><input type="checkbox" value="seikatuhogo" onchange="toggleTheme(this)"><span class="theme-label">📋 生活保護</span></label>
        <label class="theme-item"><input type="checkbox" value="imin" onchange="toggleTheme(this)"><span class="theme-label">🌐 移民・外国人問題</span></label>
        <label class="theme-item"><input type="checkbox" value="media" onchange="toggleTheme(this)"><span class="theme-label">📰 偏向報道</span></label>
        <label class="theme-item"><input type="checkbox" value="anpo" onchange="toggleTheme(this)"><span class="theme-label">🛡️ 安全保障</span></label>
      </div>
    </div>

    <!-- キーワード -->
    <div class="section">
      <div class="section-title">追加キーワード</div>
      <div class="keyword-row">
        <input type="text" id="keywordInput" placeholder="例：防衛費増額、外国人労働者、NHK受信料..." onkeydown="if(event.key==='Enter') searchTopics()">
      </div>
    </div>

    <!-- 検索ボタン -->
    <div class="search-area">
      <button class="btn btn-blue btn-search" id="searchBtn" onclick="searchTopics()">🔍 トピックを検索</button>
    </div>

    <!-- トピック一覧 -->
    <div id="topicsContainer">
      <div class="empty-state">
        <div class="icon">📝</div>
        <p>テーマを選択してトピックを検索してください</p>
      </div>
    </div>
  </div>

  <!-- ===== タブ2: エビデンス収集 ===== -->
  <div id="tab-evidence" class="tab-panel">
    <div class="evidence-grid">

      <!-- 自治体ドリルダウン -->
      <div class="ev-section">
        <div class="ev-section-title">🏛️ 自治体情報リンク</div>
        <select id="prefSelect" onchange="onPrefChange()">
          <option value="">都道府県を選択...</option>
        </select>
        <select id="citySelect" onchange="onCityChange()">
          <option value="">市町村を選択...</option>
        </select>
        <ul class="link-list" id="municipalLinks"></ul>
      </div>

      <!-- テーマ別調査ガイド -->
      <div class="ev-section">
        <div class="ev-section-title">📖 テーマ別調査ガイド</div>
        <select id="guideThemeSelect" onchange="renderGuide()">
          <option value="">テーマを選択...</option>

    { step: "STEP 3", text: "法務省「在留外国人統計」を確認", url: "https://www.moj.go.jp/isa/policies/statistics/toukei_ichiran_touroku.html" },

};

// ===== 状態 =====
let topics = [];
let drafts = {};
let memos = [];
let evidenceTargetIdx = null;

// ===== 初期化 =====
function init() {
  const savedKey = localStorage.getItem(LS_APIKEY);
  if (savedKey) document.getElementById('apiKeyInput').value = savedKey;

  try { drafts = JSON.parse(localStorage.getItem(LS_DRAFTS)) || {}; } catch(e) { drafts = {}; }
  try { memos = JSON.parse(localStorage.getItem(LS_MEMOS)) || []; } catch(e) { memos = []; }

  initPrefSelect();
  renderMemos();
}

// ===== APIキー =====
function saveApiKey() {
  const k = document.getElementById('apiKeyInput').value.trim();
  if (!k) { alert('APIキーを入力してください'); return; }
  localStorage.setItem(LS_APIKEY, k);
  showToast('✓ APIキーを保存しました');
}
function clearApiKey() {
  document.getElementById('apiKeyInput').value = '';
  localStorage.removeItem(LS_APIKEY);
  showToast('✓ APIキーをクリアしました');
}
function getApiKey() { return document.getElementById('apiKeyInput').value.trim(); }

// ===== タブ切り替え =====
function switchTab(name, btn) {
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-' + name).classList.add('active');
  btn.classList.add('active');
}

// ===== テーマ選択 =====
function toggleTheme(cb) {
  cb.closest('.theme-item').classList.toggle('checked', cb.checked);
}
function getSelectedThemes() {
  return Array.from(document.querySelectorAll('#themeGrid input:checked')).map(c => c.value);
}

// ===== Claude API =====
async function callClaude(systemPrompt, userPrompt, maxTokens = 2000) {
  const apiKey = getApiKey();
  if (!apiKey) throw new Error('APIキーが設定されていません');
  const res = await fetch(API_ENDPOINT, {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'x-api-key': apiKey,
      'anthropic-version': '2023-06-01',
      'anthropic-dangerous-direct-browser-access': 'true'
    },
    body: JSON.stringify({
      model: MODEL,
      max_tokens: maxTokens,
      system: systemPrompt,
      messages: [{ role: 'user', content: userPrompt }]
    })
  });
  if (!res.ok) {
    const e = await res.json().catch(() => ({}));
    throw new Error(`API Error ${res.status}: ${e.error?.message || res.statusText}`);
  }
  const data = await res.json();
  return data.content[0].text;
}

// ===== トピック検索 =====
async function searchTopics() {
  if (!getApiKey()) { alert('APIキーを入力・保存してください'); return; }
  const themes = getSelectedThemes();
  const kw = document.getElementById('keywordInput').value.trim();
  if (!themes.length && !kw) { alert('テーマを選択するか、キーワードを入力してください'); return; }

  const btn = document.getElementById('searchBtn');
  btn.disabled = true;
  btn.innerHTML = '<span class="loading-spinner"></span>検索中...';
  const container = document.getElementById('topicsContainer');
  container.innerHTML = '<div class="empty-state"><div class="icon">⏳</div><p>トピックを検索中...</p></div>';

  try {
    const themeLabels = themes.map(id => THEME_LABELS[id]).join('、');
    const prompt = `以下のテーマについて、最近の日本のニュースや政策動向を分析し、
保守的観点から問題提起できるトピックを5件ピックアップしてください。

テーマ: ${themeLabels || '（指定なし）'}
追加キーワード: ${kw || '（なし）'}

各トピックについて以下をJSON配列のみで返してください（前後の説明文・コードブロック記号不要）:
[
  {
    "headline": "記事の見出し案（30字以内）",
    "summary": "問題点の要約（100字程度）",
    "topics": ["関連テーマID"],
    "keyPoints": ["指摘ポイント1", "指摘ポイント2", "指摘ポイント3"],
    "dataHints": ["参照すべき統計・データのヒント"]
  }
]

テーマIDの一覧:
koukin / nichibenren / kyosanto / nikkyoso / seikatuhogo / imin / media / anpo`;

    let text = await callClaude('あなたは日本の政治・社会問題に詳しい保守系アナリストです。JSONのみを返してください。', prompt, 3000);
    text = text.trim().replace(/^```(?:json)?\s*/i, '').replace(/\s*```$/i, '');
    const s = text.indexOf('['), e = text.lastIndexOf(']');
    if (s !== -1 && e !== -1) text = text.substring(s, e + 1);
    topics = JSON.parse(text);
    renderTopics();
  } catch(err) {
    console.error('トピック検索エラー:', err);
    container.innerHTML = `<div class="error-msg">❌ エラー: ${esc(err.message)}</div>`;
  } finally {
    btn.disabled = false;
    btn.innerHTML = '🔍 トピックを検索';
  }
}

// ===== トピック表示 =====
function renderTopics() {
  const container = document.getElementById('topicsContainer');
  if (!topics.length) {
    container.innerHTML = '<div class="empty-state"><div class="icon">🔍</div><p>トピックが見つかりませんでした</p></div>';
    return;
  }
  container.innerHTML = '';
  const wrap = document.createElement('div');
  wrap.className = 'topics-container';
  topics.forEach((t, i) => wrap.appendChild(createTopicCard(t, i)));
  container.appendChild(wrap);
}

function createTopicCard(topic, idx) {
  const draft = drafts[idx];
  const hasDraft = !!(draft && draft.length);
  const card = document.createElement('div');
  card.className = 'topic-card';
  card.id = `card-${idx}`;

  const tagsHtml = (topic.topics || []).map(t => `<span class="topic-tag">${esc(THEME_LABELS[t] || t)}</span>`).join('');
  const kpHtml = (topic.keyPoints || []).map(p => `<li>${esc(p)}</li>`).join('');
  const dhHtml = (topic.dataHints || []).map(d => `<li>${esc(d)}</li>`).join('');

  const draftHtml = hasDraft
    ? `<div class="draft-area" id="draft-area-${idx}">
        <textarea id="draft-text-${idx}" onchange="saveDraft(${idx},this.value)">${esc(draft)}</textarea>
        <div class="draft-actions">
          <button class="btn btn-secondary" onclick="copyDraft(${idx})">📋 コピー</button>
          <button class="btn btn-secondary" onclick="openEvidenceModal(${idx})">📎 エビデンスを添付</button>
          <button class="btn btn-secondary" onclick="clearDraft(${idx})">🗑️ 削除</button>
        </div>
      </div>`
    : `<div class="draft-area" id="draft-area-${idx}" style="display:none;"></div>`;

  card.innerHTML = `
    <div class="topic-card-header">
      <div class="topic-headline">${esc(topic.headline || '（タイトルなし）')}</div>
      <span class="status-badge ${hasDraft ? 'status-done' : 'status-idle'}" id="status-${idx}">${hasDraft ? '✓ 完了' : '待機中'}</span>
    </div>
    <div class="topic-summary">${esc(topic.summary || '')}</div>
    <div class="topic-tags">${tagsHtml}</div>
    <div class="topic-details">
      <div class="detail-box">
        <div class="detail-box-title">📌 指摘ポイント</div>
        <ul>${kpHtml}</ul>
      </div>
      <div class="detail-box">
        <div class="detail-box-title">📊 参照データヒント</div>
        <ul>${dhHtml}</ul>
      </div>
    </div>
    <div class="topic-actions">
      <button class="btn btn-primary" id="gen-btn-${idx}" onclick="generateArticle(${idx})">✍️ 記事生成</button>
    </div>
    ${draftHtml}
  `;
  return card;
}

// ===== 記事生成 =====
async function generateArticle(idx) {
  const topic = topics[idx];
  if (!topic) return;
  const genBtn = document.getElementById(`gen-btn-${idx}`);
  const badge = document.getElementById(`status-${idx}`);
  const draftArea = document.getElementById(`draft-area-${idx}`);

  genBtn.disabled = true;
  genBtn.innerHTML = '<span class="loading-spinner"></span>生成中...';
  badge.className = 'status-badge status-generating';
  badge.textContent = '生成中...';

  try {
    const prompt = `以下のトピックについてNote投稿用の記事を執筆してください。

【見出し案】${topic.headline}
【問題点の要約】${topic.summary}
【指摘すべきポイント】
${(topic.keyPoints || []).map((p,i) => `${i+1}. ${p}`).join('\n')}
【参照すべきデータ・統計のヒント】
${(topic.dataHints || []).join('\n')}

上記を踏まえ、保守的観点から1500〜2000字のNote記事を執筆してください。
Note向けのマークダウン形式で出力してください。`;

    const text = await callClaude(SYSTEM_PROMPT_ARTICLE, prompt, 3000);
    saveDraft(idx, text);

    draftArea.style.display = '';
    draftArea.innerHTML = `
      <textarea id="draft-text-${idx}" onchange="saveDraft(${idx},this.value)">${esc(text)}</textarea>
      <div class="draft-actions">
        <button class="btn btn-secondary" onclick="copyDraft(${idx})">📋 コピー</button>
        <button class="btn btn-secondary" onclick="openEvidenceModal(${idx})">📎 エビデンスを添付</button>
        <button class="btn btn-secondary" onclick="clearDraft(${idx})">🗑️ 削除</button>
      </div>`;

    badge.className = 'status-badge status-done';
    badge.textContent = '✓ 完了';
    genBtn.innerHTML = '✍️ 再生成';
  } catch(err) {
    console.error(`記事生成エラー(${idx}):`, err);
    badge.className = 'status-badge status-error';
    badge.textContent = 'エラー';
    draftArea.style.display = '';
    draftArea.innerHTML = `<div class="error-msg">❌ エラー: ${esc(err.message)}</div>`;
    genBtn.innerHTML = '✍️ 再試行';
  } finally {
    genBtn.disabled = false;
  }
}

// ===== 下書き管理 =====
function saveDraft(idx, text) {
  drafts[idx] = text;
  localStorage.setItem(LS_DRAFTS, JSON.stringify(drafts));
}
function clearDraft(idx) {
  if (!confirm('この下書きを削除しますか？')) return;
  delete drafts[idx];
  localStorage.setItem(LS_DRAFTS, JSON.stringify(drafts));
  const da = document.getElementById(`draft-area-${idx}`);
  da.style.display = 'none'; da.innerHTML = '';
  const b = document.getElementById(`status-${idx}`);
  b.className = 'status-badge status-idle'; b.textContent = '待機中';
  document.getElementById(`gen-btn-${idx}`).innerHTML = '✍️ 記事生成';
}
async function copyDraft(idx) {
  const ta = document.getElementById(`draft-text-${idx}`);
  if (!ta) return;
  try { await navigator.clipboard.writeText(ta.value); }
  catch(e) { ta.select(); document.execCommand('copy'); }
  showToast('✓ クリップボードにコピーしました');
}

// ===== エビデンス添付モーダル =====
function openEvidenceModal(idx) {
  evidenceTargetIdx = idx;
  const list = document.getElementById('modalMemoList');
  if (!memos.length) {
    list.innerHTML = '<p style="color:var(--text-muted);font-size:13px;">メモがありません。メモ帳タブで追加してください。</p>';
  } else {
    list.innerHTML = memos.map((m, i) => `
      <div class="modal-memo-item" onclick="attachEvidence(${i})">
        <div class="title">${esc(m.title)}</div>
        <div class="preview">${esc(m.body)}</div>
      </div>`).join('');
  }
  document.getElementById('evidenceModal').classList.remove('hidden');
}
function closeEvidenceModal() {
  document.getElementById('evidenceModal').classList.add('hidden');
  evidenceTargetIdx = null;
}
function attachEvidence(memoIdx) {
  const memo = memos[memoIdx];
  if (!memo || evidenceTargetIdx === null) return;
  const ta = document.getElementById(`draft-text-${evidenceTargetIdx}`);
  if (!ta) return;
  const append = `\n\n---\n**【エビデンス】${memo.title}**\n${memo.body}`;
  ta.value += append;
  saveDraft(evidenceTargetIdx, ta.value);
  closeEvidenceModal();
  showToast('✓ エビデンスを添付しました');
}

// ===== 都道府県・市町村 =====
function initPrefSelect() {
  const sel = document.getElementById('prefSelect');
  Object.keys(PREF_CITY_DATA).forEach(pref => {
    const opt = document.createElement('option');
    opt.value = pref; opt.textContent = pref;
    sel.appendChild(opt);
  });
}
function onPrefChange() {
  const pref = document.getElementById('prefSelect').value;
  const citySel = document.getElementById('citySelect');
  citySel.innerHTML = '<option value="">市町村を選択...</option>';
  document.getElementById('municipalLinks').innerHTML = '';
  if (!pref) return;
  (PREF_CITY_DATA[pref] || []).forEach(city => {
    const opt = document.createElement('option');
    opt.value = city; opt.textContent = city;
    citySel.appendChild(opt);
  });
}
function onCityChange() {
  const pref = document.getElementById('prefSelect').value;
  const city = document.getElementById('citySelect').value;
  const linksEl = document.getElementById('municipalLinks');
  linksEl.innerHTML = '';
  if (!city) return;
  const name = encodeURIComponent(city);
  const links = [
    { label: '🌐 公式サイト', url: `https://www.google.com/search?q=${name}+公式サイト` },
    { label: '📜 議会議事録', url: `https://www.google.com/search?q=${name}+議会議事録+検索` },
    { label: '💰 決算書・予算書', url: `https://www.google.com/search?q=${name}+決算書+生活保護+扶助費` },
    { label: '📄 情報公開請求', url: `https://www.google.com/search?q=${name}+情報公開請求+外国人+生活保護` }
  ];
  links.forEach(l => {
    const li = document.createElement('li');
    li.innerHTML = `<a href="${l.url}" target="_blank" rel="noopener">${l.label}</a>`;
    linksEl.appendChild(li);
  });
}

// ===== 調査ガイド =====
function renderGuide() {
  const theme = document.getElementById('guideThemeSelect').value;
  const el = document.getElementById('guideContent');
  if (!theme || !GUIDE_DATA[theme]) { el.innerHTML = ''; return; }
  el.innerHTML = '<div class="guide-steps">' +
    GUIDE_DATA[theme].map(s => `
      <div class="guide-step">
        <div class="guide-step-label">${s.step}</div>
        <p>${esc(s.text)}</p>
        ${s.url ? `<a href="${s.url}" target="_blank" rel="noopener">→ ${s.url}</a>` : ''}
        ${s.note ? `<p style="font-size:11px;color:var(--text-muted);margin-top:2px;">${esc(s.note)}</p>` : ''}
      </div>`).join('') +
    '</div>';
}

// ===== 国会議事録検索 =====
function searchKokkai() {
  const kw = document.getElementById('kokkaiKeyword').value.trim();
  if (!kw) { alert('キーワードを入力してください'); return; }
  window.open(`https://kokkai.ndl.go.jp/#/simple?keyword=${encodeURIComponent(kw)}`, '_blank');
}

// ===== 情報公開テンプレ生成 =====
async function generateTemplate() {
  const municipality = document.getElementById('templateMunicipality').value.trim();
  const theme = document.getElementById('templateTheme').value.trim();
  if (!municipality || !theme) { alert('自治体名と請求テーマを入力してください'); return; }
  if (!getApiKey()) { alert('APIキーを入力・保存してください'); return; }

  const btn = document.getElementById('templateBtn');
  btn.disabled = true;
  btn.innerHTML = '<span class="loading-spinner"></span>生成中...';

  try {
    const prompt = `以下の条件で情報公開請求の文書を作成してください。

自治体名：${municipality}
請求テーマ：${theme}

【形式】
・行政機関への正式な請求文書として作成
・請求する文書名を具体的に列挙（3〜5件）
・根拠法令（情報公開条例）を明記
・丁寧な文体
・400字程度`;

    const text = await callClaude('あなたは行政手続きの専門家です。情報公開請求の文書を作成してください。', prompt, 1000);
    const resultEl = document.getElementById('templateResult');
    document.getElementById('templateText').value = text;
    resultEl.style.display = '';
  } catch(err) {
    console.error('テンプレ生成エラー:', err);
    alert('エラー: ' + err.message);
  } finally {
    btn.disabled = false;
    btn.innerHTML = '✍️ テンプレ生成';
  }
}
async function copyTemplate() {
  const ta = document.getElementById('templateText');
  try { await navigator.clipboard.writeText(ta.value); }
  catch(e) { ta.select(); document.execCommand('copy'); }
  showToast('✓ クリップボードにコピーしました');
}

// ===== メモ帳 =====
function addMemo() {
  const title = document.getElementById('memoTitle').value.trim();
  const body = document.getElementById('memoBody').value.trim();
  if (!title && !body) { alert('タイトルまたは本文を入力してください'); return; }
  memos.unshift({ id: Date.now(), title: title || '（無題）', body, date: new Date().toLocaleDateString('ja-JP') });
  localStorage.setItem(LS_MEMOS, JSON.stringify(memos));
  document.getElementById('memoTitle').value = '';
  document.getElementById('memoBody').value = '';
  renderMemos();
  showToast('✓ メモを追加しました');
}
function deleteMemo(id) {
  if (!confirm('このメモを削除しますか？')) return;
  memos = memos.filter(m => m.id !== id);
  localStorage.setItem(LS_MEMOS, JSON.stringify(memos));
  renderMemos();
}
async function copyMemo(id) {
  const m = memos.find(m => m.id === id);
  if (!m) return;
  try { await navigator.clipboard.writeText(`${m.title}\n\n${m.body}`); }
  catch(e) {}
  showToast('✓ コピーしました');
}
function renderMemos() {
  const el = document.getElementById('memoList');
  if (!memos.length) {
    el.innerHTML = '<div class="empty-state"><div class="icon">📋</div><p>メモがありません。調査中に見つけた情報をストックしましょう。</p></div>';
    return;
  }
  el.innerHTML = '<div class="memo-list">' +
    memos.map(m => `
      <div class="memo-card">
        <div class="memo-card-header">
          <div class="memo-card-title">${esc(m.title)}</div>
          <div class="memo-card-date">${esc(m.date || '')}</div>
        </div>
        <div class="memo-card-body">${esc(m.body)}</div>
        <div class="memo-card-actions">
          <button class="btn btn-secondary" onclick="copyMemo(${m.id})">📋 コピー</button>
          <button class="btn btn-secondary" onclick="deleteMemo(${m.id})">🗑️ 削除</button>
        </div>
      </div>`).join('') +
    '</div>';
}

// ===== トースト =====
let toastTimer = null;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  if (toastTimer) clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2500);
}

// ===== ユーティリティ =====
function esc(s) {
  if (typeof s !== 'string') return '';
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#039;');
}

// ===== 起動 =====
init();
</script>
